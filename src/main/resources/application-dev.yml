server:
  port: ${SERVER_PORT:10010}
  forward-headers-strategy: framework

spring:
  application:
    name: qsl-tracker-admin
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:127.0.0.1}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:qsl_tracker}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:qsl_tracker}
    password: ${MYSQL_PASSWORD:change-me-local-mysql-password}
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      validation-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      connect-timeout: 3s
      timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 259200
  active-timeout: -1
  is-concurrent: false
  is-share: false
  is-log: false
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY:qsl-tracker-dev-jwt-secret-key-change-before-production}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

qsl:
  captcha:
    width: 130
    height: 48
    difficulty: 20
    ttl-seconds: 120
    rate-window-seconds: 60
    generate-limit: 20
    verify-limit: 30
  public-base-url: ${QSL_PUBLIC_BASE_URL:http://127.0.0.1:8080}
  storage:
    local-root: ${QSL_STORAGE_LOCAL_ROOT:E:/file/qsl-tracker}
  user:
    init-enabled: true
    username: admin
    password: admin123
logging:
  file:
    path: ${LOGGING_FILE_PATH:logs}
  level:
    root: info
    com.qsl.tracker: debug
    com.qsl.tracker.mapper: debug

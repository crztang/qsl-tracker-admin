server:
  port: 10010

spring:
  application:
    name: qsl-tracker-admin
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://192.168.100.128:3306/qsl_tracker?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: "123456"
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      validation-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      connect-timeout: 3s
      timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 259200
  active-timeout: -1
  is-concurrent: false
  is-share: false
  is-log: false
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

qsl:
  captcha:
    width: ${CAPTCHA_WIDTH:130}
    height: ${CAPTCHA_HEIGHT:48}
    difficulty: ${CAPTCHA_DIFFICULTY:20}
    ttl-seconds: ${CAPTCHA_TTL_SECONDS:120}
    rate-window-seconds: ${CAPTCHA_RATE_WINDOW_SECONDS:60}
    generate-limit: ${CAPTCHA_GENERATE_LIMIT:20}
    verify-limit: ${CAPTCHA_VERIFY_LIMIT:30}
  public-base-url: http://localhost:8080
  storage:
    local-root: E:/file/qsl-tracker
  user:
    init-enabled: true
    username: admin
    password: admin123
logging:
  level:
    root: info
    com.qsl.tracker: info
    com.qsl.tracker.mapper: warn

server:
  port: ${SERVER_PORT:10010}
  forward-headers-strategy: framework

spring:
  application:
    name: qsl-tracker-admin
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://${MYSQL_HOST:mysql}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:qsl_tracker}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${MYSQL_USER:qsl_tracker}
    password: ${MYSQL_PASSWORD}
    druid:
      initial-size: 2
      min-idle: 2
      max-active: 10
      validation-query: SELECT 1
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      connect-timeout: 3s
      timeout: 3s

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto
sa-token:
  token-name: Authorization
  token-prefix: Bearer
  timeout: 259200
  active-timeout: -1
  is-concurrent: false
  is-share: false
  is-log: false
  jwt-secret-key: ${SA_TOKEN_JWT_SECRET_KEY}

springdoc:
  swagger-ui:
    path: /swagger-ui.html

qsl:
  captcha:
    width: ${CAPTCHA_WIDTH:130}
    height: ${CAPTCHA_HEIGHT:48}
    difficulty: ${CAPTCHA_DIFFICULTY:20}
    ttl-seconds: ${CAPTCHA_TTL_SECONDS:120}
    rate-window-seconds: ${CAPTCHA_RATE_WINDOW_SECONDS:60}
    generate-limit: ${CAPTCHA_GENERATE_LIMIT:20}
    verify-limit: ${CAPTCHA_VERIFY_LIMIT:30}
  public-base-url: ${QSL_PUBLIC_BASE_URL:http://localhost}
  storage:
    local-root: ${QSL_STORAGE_LOCAL_ROOT:/data/qsl-tracker/files}
  user:
    init-enabled: true
    username: admin
    password: admin123
logging:
  file:
    path: ${LOGGING_FILE_PATH:/data/qsl-tracker/logs}
  level:
    root: info
    com.qsl.tracker: info
    com.qsl.tracker.mapper: warn
